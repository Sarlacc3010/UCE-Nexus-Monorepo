server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=30s;
    set $upstream_gateway nexus-ms-01-gateway:3000;
    set $upstream_academic nexus-web-academic:80;
    set $upstream_campus nexus-web-campus:80;
    set $upstream_chatbot nexus-web-chatbot:80;

    # -- Proxy API calls to the internal API Gateway (ms-01-gateway:3000) --
    location /api/ {
        proxy_pass         http://$upstream_gateway$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # -- Proxy WebSockets to the internal API Gateway --
    location /ws/ {
        proxy_pass         http://$upstream_gateway$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # -- Micro-frontend: web-academic (Module Federation remote) --
    location /academic-mf/ {
        rewrite            ^/academic-mf/(.*)$ /$1 break;
        proxy_pass         http://$upstream_academic;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        add_header         Access-Control-Allow-Origin *;
    }

    # -- Micro-frontend: web-campus (Module Federation remote) --
    location /campus-mf/ {
        rewrite            ^/campus-mf/(.*)$ /$1 break;
        proxy_pass         http://$upstream_campus;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        add_header         Access-Control-Allow-Origin *;
    }

    # -- Micro-frontend: web-chatbot (Module Federation remote) --
    location /chatbot-mf/ {
        rewrite            ^/chatbot-mf/(.*)$ /$1 break;
        proxy_pass         http://$upstream_chatbot;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        add_header         Access-Control-Allow-Origin *;
    }

    # -- SPA fallback: serve index.html for any unknown paths --
    location / {
        try_files $uri $uri/ /index.html;
    }
}
