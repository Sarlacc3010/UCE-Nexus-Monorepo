name: UCE-Nexus CD Deployment

on:
  push:
    branches:
      - qa
    tags:
      - 'v*'

env:
  DOCKER_HUB_TAG: qa

jobs:
  deploy:
    name: Deploy to EC2 via Bastion Jump
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ==========================================
      # 1. Configurar Llave SSH e Identidad de Red
      # ==========================================
      - name: Configure SSH and Jump Host (Bastion)
        run: |
          mkdir -p ~/.ssh
          
          # Determinar variables según la rama (QA o Tag de Versión/Production)
          if [[ "${{ github.ref_name }}" =~ ^v[0-9] ]]; then
            echo "DEPLOY_ENV=Production" >> $GITHUB_ENV
            echo "DOCKER_HUB_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
            echo "BASTION_IP=${{ secrets.PROD_BASTION_IP }}" >> $GITHUB_ENV
            echo "APP_PRIVATE_IP=${{ secrets.PROD_APP_PRIVATE_IP }}" >> $GITHUB_ENV
            echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          else
            echo "DEPLOY_ENV=QA" >> $GITHUB_ENV
            echo "DOCKER_HUB_TAG=qa" >> $GITHUB_ENV
            echo "BASTION_IP=${{ secrets.QA_BASTION_IP }}" >> $GITHUB_ENV
            echo "APP_PRIVATE_IP=${{ secrets.QA_APP_PRIVATE_IP }}" >> $GITHUB_ENV
            echo "${{ secrets.QA_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          fi
          
          chmod 600 ~/.ssh/id_rsa

      - name: Generate SSH SSH Config file
        run: |
          # Crear el archivo de configuración SSH con salto (ProxyJump)
          cat <<EOF > ~/.ssh/config
          Host bastion
            HostName ${BASTION_IP}
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            ControlMaster auto
            ControlPath ~/.ssh/ansible-%r@%h:%p
            ControlPersist 5m

          Host app-server
            HostName ${APP_PRIVATE_IP}
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            ProxyJump bastion
            StrictHostKeyChecking no
          EOF

      # ==========================================
      # 2. Diagnóstico de Conexión y Secretos
      # ==========================================
      - name: Test SSH Connection and Secrets
        run: |
          echo "==== DIAGNOSTIC SSH CONNECTION TEST ===="
          echo "Target Environment: ${DEPLOY_ENV}"
          
          # Verificar si las variables están vacías
          if [ -z "${BASTION_IP}" ]; then
            echo "❌ ERROR: BASTION_IP is empty. Please check if QA_BASTION_IP or PROD_BASTION_IP is set in GitHub Secrets."
            exit 1
          fi
          if [ -z "${APP_PRIVATE_IP}" ]; then
            echo "❌ ERROR: APP_PRIVATE_IP is empty. Please check if QA_APP_PRIVATE_IP or PROD_APP_PRIVATE_IP is set in GitHub Secrets."
            exit 1
          fi
          
          echo "BASTION_IP length: ${#BASTION_IP}"
          echo "APP_PRIVATE_IP length: ${#APP_PRIVATE_IP}"
          
          # Probar conectividad al Bastion por el puerto 22 (SSH)
          echo "Testing connection to Bastion (${BASTION_IP}) on port 22..."
          nc -zv -w 5 ${BASTION_IP} 22 || echo "⚠️ Warning: Cannot reach Bastion on port 22. Check if instance is running and SG allows SSH."
          
          # Intentar conectar en modo verboso para depurar
          echo "Testing SSH connection through Bastion to App Server..."
          ssh -v -o ConnectTimeout=10 app-server "echo 'SSH connection via Bastion Jump is working!'"

      # ==========================================
      # 3. Preparar Directorio en el Servidor App
      # ==========================================
      - name: Create Remote Deploy Directory
        run: |
          ssh app-server "mkdir -p /home/ubuntu/app"

      # ==========================================
      # 4. Transferir Archivo de Producción (Compose)
      # ==========================================
      - name: Copy docker-compose.prod.yml to App Server
        run: |
          scp infra/docker/docker-compose.prod.yml app-server:/home/ubuntu/app/docker-compose.prod.yml

      # ==========================================
      # 5. Desplegar Aplicación (Login, Pull, Up)
      # ==========================================
      - name: Deploy Containers on App Server
        run: |
          # 1. Autenticar Docker en la máquina remota con el registro Docker Hub
          ssh app-server "echo '${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}' | docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin"
          
          # 2. Descargar últimas imágenes y levantar servicios
          ssh app-server "
            cd /home/ubuntu/app && \
            DOCKER_HUB_USER=${{ secrets.DOCKER_HUB_USERNAME }} IMAGE_TAG=${{ env.DOCKER_HUB_TAG }} docker-compose -f docker-compose.prod.yml pull && \
            DOCKER_HUB_USER=${{ secrets.DOCKER_HUB_USERNAME }} IMAGE_TAG=${{ env.DOCKER_HUB_TAG }} docker-compose -f docker-compose.prod.yml up -d --remove-orphans
          "
          
          # 3. Limpieza de imágenes huérfanas/antiguas para liberar espacio
          ssh app-server "docker image prune -f"
