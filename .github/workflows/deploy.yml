name: UCE-Nexus CD Deployment

on:
  push:
    branches:
      - qa
      - main

jobs:
  deploy:
    name: Deploy to EC2 via Bastion Jump
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ==========================================
      # 1. Configurar Llave SSH e Identidad de Red
      # ==========================================
      - name: Configure SSH and Jump Host (Bastion)
        run: |
          mkdir -p ~/.ssh
          # Escribir la llave SSH privada desde los secretos de GitHub
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Determinar IPs según la rama (QA o Main/Production)
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "DEPLOY_ENV=Production" >> $GITHUB_ENV
            echo "BASTION_IP=${{ secrets.PROD_BASTION_IP }}" >> $GITHUB_ENV
            echo "APP_PRIVATE_IP=${{ secrets.PROD_APP_PRIVATE_IP }}" >> $GITHUB_ENV
          else
            echo "DEPLOY_ENV=QA" >> $GITHUB_ENV
            echo "BASTION_IP=${{ secrets.QA_BASTION_IP }}" >> $GITHUB_ENV
            echo "APP_PRIVATE_IP=${{ secrets.QA_APP_PRIVATE_IP }}" >> $GITHUB_ENV
          fi

      - name: Generate SSH SSH Config file
        run: |
          # Crear el archivo de configuración SSH con salto (ProxyJump)
          cat <<EOF > ~/.ssh/config
          Host bastion
            HostName ${BASTION_IP}
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            ControlMaster auto
            ControlPath ~/.ssh/ansible-%r@%h:%p
            ControlPersist 5m

          Host app-server
            HostName ${APP_PRIVATE_IP}
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            ProxyJump bastion
            StrictHostKeyChecking no
          EOF

      # ==========================================
      # 2. Preparar Directorio en el Servidor App
      # ==========================================
      - name: Create Remote Deploy Directory
        run: |
          ssh app-server "mkdir -p /home/ubuntu/app"

      # ==========================================
      # 3. Transferir Archivo de Producción (Compose)
      # ==========================================
      - name: Copy docker-compose.prod.yml to App Server
        run: |
          scp infra/docker/docker-compose.prod.yml app-server:/home/ubuntu/app/docker-compose.prod.yml

      # ==========================================
      # 4. Desplegar Aplicación (Login, Pull, Up)
      # ==========================================
      - name: Deploy Containers on App Server
        run: |
          # 1. Autenticar Docker en la máquina remota con el registro GHCR
          ssh app-server "echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin"
          
          # 2. Descargar últimas imágenes y levantar servicios
          ssh app-server "
            cd /home/ubuntu/app && \
            REGISTRY_OWNER=${{ github.repository_owner }} docker-compose -f docker-compose.prod.yml pull && \
            REGISTRY_OWNER=${{ github.repository_owner }} docker-compose -f docker-compose.prod.yml up -d --remove-orphans
          "
          
          # 3. Limpieza de imágenes huérfanas/antiguas para liberar espacio
          ssh app-server "docker image prune -f"
