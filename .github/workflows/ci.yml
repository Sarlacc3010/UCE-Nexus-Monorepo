name: UCE-Nexus CI Pipeline

on:
  push:
    branches: [ "Dev", "QA" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "Dev", "QA" ]
  workflow_dispatch:

env:
  IMAGE_TAG: latest

permissions:
  contents: read

jobs:
  # ==========================================
  # 1. DevSecOps: Escaneo de Secretos
  # ==========================================
  secrets-scan:
    name: Secrets Detection (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog Secret Scanner
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true # Permite advertencias sin bloquear si hay falsos positivos

  # ==========================================
  # 2. DevOps: Path Filtering para Monorepo
  # ==========================================
  changes-detector:
    name: Detect File Changes
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      identity: ${{ steps.filter.outputs.identity }}
      booking: ${{ steps.filter.outputs.booking }}
      notifications: ${{ steps.filter.outputs.notifications }}
      catalog: ${{ steps.filter.outputs.catalog }}
      web_host: ${{ steps.filter.outputs.web_host }}
      web_academic: ${{ steps.filter.outputs.web_academic }}
      web_campus: ${{ steps.filter.outputs.web_campus }}
      web_chatbot: ${{ steps.filter.outputs.web_chatbot }}
      enrollment: ${{ steps.filter.outputs.enrollment }}
      ai_agent: ${{ steps.filter.outputs.ai_agent }}
      geocampus: ${{ steps.filter.outputs.geocampus }}
      payment_write: ${{ steps.filter.outputs.payment_write }}
      payment_read: ${{ steps.filter.outputs.payment_read }}
      web_payments: ${{ steps.filter.outputs.web_payments }}
      audit: ${{ steps.filter.outputs.audit }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Filter Path Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            gateway:
              - 'services/ms-01-gateway/**'
            identity:
              - 'services/ms-02-identity/**'
            booking:
              - 'services/ms-06-booking/**'
            notifications:
              - 'services/ms-07-notifications/**'
            catalog:
              - 'services/ms-11-catalog/**'
            web_host:
              - 'apps/web-host/**'
            web_academic:
              - 'apps/web-academic/**'
            web_campus:
              - 'apps/web-campus/**'
            web_chatbot:
              - 'apps/web-chatbot/**'
            enrollment:
              - 'services/ms-03-enrollment/**'
            ai_agent:
              - 'services/ms-08-ai-agent/**'
            geocampus:
              - 'services/ms-09-geocampus/**'
            payment_write:
              - 'services/ms-04-payment-write/**'
            payment_read:
              - 'services/ms-05-payment-read/**'
            web_payments:
              - 'apps/web-payments/**'
            audit:
              - 'services/ms-10-audit/**'

  # ==========================================
  # 2.5. CI: Pruebas Unitarias
  # ==========================================
  run-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Protobuf Compiler (protoc)
        run: |
          # Instalar protoc desde GitHub releases (apt-get da protoc 3.12 que es incompatible con prost-build 0.12)
          PROTOC_VERSION="25.3"
          curl -sLO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -q protoc-${PROTOC_VERSION}-linux-x86_64.zip -d /usr/local
          protoc --version

      - name: Set up Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            services/ms-08-ai-agent
            services/ms-09-geocampus
            services/ms-10-audit

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: 'services/ms-06-booking/go.sum'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies (ms-08-ai-agent)
        run: |
          pip install -r services/ms-08-ai-agent/requirements.txt

      - name: Install Monorepo Dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Unit Tests (Turbo)
        run: npm run test

      - name: Run Rust Tests (Catalog)
        env:
          SQLX_OFFLINE: true
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test
        run: |
          cd services/ms-11-catalog
          cargo test

      - name: Run Rust Tests (Geocampus)
        run: |
          cd services/ms-09-geocampus
          cargo test

  # ==========================================
  # 2.8. CI: Pruebas de Carga (Load Testing)
  # ==========================================
  load-tests:
    name: Run Load Tests (K6)
    runs-on: ubuntu-latest
    needs: [run-tests]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up K6
        uses: grafana/setup-k6-action@v1

      - name: Run K6 Stress Test
        # Simulamos que el API Gateway corre en CI para el test de carga, 
        # en producción apuntaría al ambiente de staging.
        run: |
          k6 run packages/load-testing/k6-stress-test.js || echo "K6 test allowed to fail if Gateway is not running in CI"

  # ==========================================
  # 3. Build & Push: API Gateway (MS-01)
  # ==========================================
  build-identity:
    name: Build & Push Identity (MS-02)
    needs: [changes-detector, secrets-scan, run-tests]
    if: ${{ needs.changes-detector.outputs.identity == 'true' || github.event_name == 'workflow_dispatch' || github.ref_name == 'main' || github.ref_name == 'QA' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set Docker Image Tag
        run: |
          if [[ "${{ github.ref_name }}" =~ ^v[0-9] ]]; then
            echo "IMAGE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          elif [ "${{ github.ref_name }}" = "QA" ]; then
            echo "IMAGE_TAG=qa" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          fi

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./services/ms-02-identity
          file: ./services/ms-02-identity/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/ms-02-identity:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/ms-02-identity:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # 3. Build & Push: API Gateway (MS-01)
  # ==========================================
  build-gateway:
    name: Build & Push Gateway (MS-01)
    needs: [changes-detector, secrets-scan, run-tests]
    if: ${{ needs.changes-detector.outputs.gateway == 'true' || github.event_name == 'workflow_dispatch' || github.ref_name == 'main' || github.ref_name == 'QA' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set Docker Image Tag
        run: |
          if [[ "${{ github.ref_name }}" =~ ^v[0-9] ]]; then
            echo "IMAGE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          elif [ "${{ github.ref_name }}" = "QA" ]; then
            echo "IMAGE_TAG=qa" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          fi

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./services/ms-01-gateway
          file: ./services/ms-01-gateway/dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/ms-01-gateway:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/ms-01-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # 4. Build & Push: Booking Engine (MS-06)
  # ==========================================
  build-booking:
    name: Build & Push Booking (MS-06)
    needs: [changes-detector, secrets-scan, run-tests]
    if: ${{ needs.changes-detector.outputs.booking == 'true' || github.event_name == 'workflow_dispatch' || github.ref_name == 'main' || github.ref_name == 'QA' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
