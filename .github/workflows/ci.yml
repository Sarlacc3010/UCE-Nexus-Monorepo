name: UCE-Nexus CI Pipeline

on:
  push:
    branches: [ "main", "dev", "qa" ]
  pull_request:
    branches: [ "main", "dev", "qa" ]

jobs:
  build-gateway:
    name: Build API Gateway (MS-01)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t uce-nexus/ms-01-gateway ./services/ms-01-gateway

  build-booking:
    name: Build Booking Engine (MS-06)
    runs-on: ubuntu-latest
    steps:
      
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t uce-nexus/ms-06-booking ./services/ms-06-booking
