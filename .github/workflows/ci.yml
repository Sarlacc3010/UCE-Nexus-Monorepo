        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set Docker Image Tag
        run: |
          if [[ "${{ github.ref_name }}" =~ ^v[0-9] ]]; then
            echo "IMAGE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          elif [ "${{ github.ref_name }}" = "QA" ]; then
            echo "IMAGE_TAG=qa" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          fi

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./services/ms-09-geocampus
          file: ./services/ms-09-geocampus/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/ms-09-geocampus:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/ms-09-geocampus:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
