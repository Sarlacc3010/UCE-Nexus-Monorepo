name: UCE-Nexus CI Pipeline

on:
  push:
    branches: [ "main", "dev", "qa" ]
  pull_request:
    branches: [ "main", "dev", "qa" ]

permissions:
  contents: read
  packages: write

jobs:
  # ==========================================
  # 1. DevSecOps: Escaneo de Secretos
  # ==========================================
  secrets-scan:
    name: Secrets Detection (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog Secret Scanner
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true # Permite advertencias sin bloquear si hay falsos positivos

  # ==========================================
  # 2. DevOps: Path Filtering para Monorepo
  # ==========================================
  changes-detector:
    name: Detect File Changes
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      booking: ${{ steps.filter.outputs.booking }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Filter Path Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            gateway:
              - 'services/ms-01-gateway/**'
            booking:
              - 'services/ms-06-booking/**'

  # ==========================================
  # 3. Compilación y Publicación: API Gateway
  # ==========================================
  build-gateway:
    name: Build & Push Gateway (MS-01)
    needs: [changes-detector, secrets-scan]
    if: ${{ needs.changes-detector.outputs.gateway == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lint Dockerfile (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./services/ms-01-gateway/dockerfile
          failure-threshold: error

      - name: Downcase Owner Name for GHCR
        run: echo "OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> ${GITHUB_ENV}

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./services/ms-01-gateway
          file: ./services/ms-01-gateway/dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ env.OWNER_LOWER }}/ms-01-gateway:latest
            ghcr.io/${{ env.OWNER_LOWER }}/ms-01-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # 4. Compilación y Publicación: Booking Engine
  # ==========================================
  build-booking:
    name: Build & Push Booking Engine (MS-06)
    needs: [changes-detector, secrets-scan]
    if: ${{ needs.changes-detector.outputs.booking == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lint Dockerfile (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./services/ms-06-booking/dockerfile
          failure-threshold: error

      - name: Downcase Owner Name for GHCR
        run: echo "OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> ${GITHUB_ENV}

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./services/ms-06-booking
          file: ./services/ms-06-booking/dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ env.OWNER_LOWER }}/ms-06-booking:latest
            ghcr.io/${{ env.OWNER_LOWER }}/ms-06-booking:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
