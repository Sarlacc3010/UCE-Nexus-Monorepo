          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/web-chatbot:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/web-chatbot:${{ github.sha }}
          cache-from: type=gha
