name: SonarQube Analysis - UCE Nexus Monorepo

on:
  push:
    branches:
      - Dev
      - QA-Calidad
  pull_request:
    branches:
      - Dev
      - QA-Calidad

jobs:
  sonarqube:
    name: SonarQube Scan (multi-lenguaje + SCA)
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ==========================================
      # 1. Toolchains: Node, Python, Go, Rust
      # ==========================================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: 'services/ms-06-booking/go.sum'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            services/ms-09-geocampus
            services/ms-11-catalog

      - name: Setup Protobuf Compiler (protoc, requerido por ms-11-catalog)
        run: |
          PROTOC_VERSION="25.3"
          curl -sLO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -q protoc-${PROTOC_VERSION}-linux-x86_64.zip -d /usr/local
          protoc --version

      - name: Install dependencies (Node/TS)
        run: npm ci --legacy-peer-deps

      # ==========================================
      # 2. Cobertura de tests por lenguaje
      #    (continue-on-error: un lenguaje sin tests no debe tumbar el análisis)
      # ==========================================
      - name: Tests Node/TS con cobertura (Turborepo)
        run: npm run test -- --coverage
        continue-on-error: true

      - name: Tests Python con cobertura (ms-07-notifications)
        working-directory: services/ms-07-notifications
        run: |
          pip install -r requirements.txt pytest-cov
          pytest --cov=. --cov-report=xml:coverage.xml || true
        continue-on-error: true

      - name: Tests Python con cobertura (ms-08-ai-agent)
        working-directory: services/ms-08-ai-agent
        run: |
          pip install -r requirements.txt pytest-cov
          pytest --cov=. --cov-report=xml:coverage.xml || true
        continue-on-error: true

      - name: Tests Go con cobertura (ms-06-booking)
        working-directory: services/ms-06-booking
        run: go test ./... -coverprofile=coverage.out
        continue-on-error: true

      # ==========================================
      # 3. Calidad de código Rust vía SARIF
      #    (SonarQube no tiene analizador nativo de Rust; se importan los
      #    hallazgos de clippy como issues externos)
      # ==========================================
      - name: Instalar clippy-sarif y sarif-fmt
        run: cargo install clippy-sarif sarif-fmt
        continue-on-error: true

      - name: Clippy -> SARIF (ms-09-geocampus)
        working-directory: services/ms-09-geocampus
        run: |
          cargo clippy --message-format=json -q | clippy-sarif | tee clippy.sarif | sarif-fmt
          # clippy emite rutas relativas a este directorio (src/graph.rs); SonarQube
          # necesita rutas relativas a la raíz del repo para resolver la ubicación.
          sed -i 's#"uri": "src/#"uri": "services/ms-09-geocampus/src/#g' clippy.sarif
        continue-on-error: true

      - name: Clippy -> SARIF (ms-11-catalog)
        working-directory: services/ms-11-catalog
        run: |
          cargo clippy --message-format=json -q | clippy-sarif | tee clippy.sarif | sarif-fmt
          sed -i 's#"uri": "src/#"uri": "services/ms-11-catalog/src/#g' clippy.sarif
        continue-on-error: true

      # ==========================================
      # 4. SCA (Software Composition Analysis)
      #    OWASP Dependency-Check cubre npm, pip (requirements.txt) y Go
      #    (go.sum) en una sola pasada. Rust (Cargo.lock) no tiene analizador
      #    en Dependency-Check, por eso se complementa con cargo-audit.
      # ==========================================
      # La GitHub Action "dependency-check/Dependency-Check_Action" concatena
      # todo 'args' como un único argumento entrecomillado al invocar el CLI
      # dentro del contenedor (bug confirmado en el log: el scanner recibe
      # "--enableExperimental --exclude ... --exclude \"**/.git/**\"" como
      # UN solo token en vez de flags separados) y además exige que 'out'
      # exista de antemano. Por eso se invoca el CLI oficial directo por
      # Docker, sin ese intermediario.
      #
      # --noupdate por sí solo NO funciona en un runner fresco: la imagen
      # owasp/dependency-check no trae una base de datos precargada, así que
      # --noupdate sin un update previo exitoso falla con exit code 13
      # (NoDataException: "Autoupdate is disabled and the database does not
      # exist" — verificado). La solución es cachear la base de datos con una
      # key ESTABLE (no ligada a github.run_id) para que, una vez que un
      # update complete con éxito, quede persistida y las corridas
      # siguientes puedan usar --noupdate de verdad.
      - name: Preparar flag de NVD API key
        id: nvd
        run: |
          if [ -n "${{ secrets.NVD_API_KEY }}" ]; then
            echo "flag=--nvdApiKey ${{ secrets.NVD_API_KEY }}" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache de la base de datos NVD (Dependency-Check)
        id: depcheck-cache
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check-data
          key: depcheck-nvd-db-v1

      - name: OWASP Dependency-Check (SCA npm + pip + go)
        run: |
          mkdir -p reports/dependency-check
          mkdir -p ~/.dependency-check-data
          UPDATE_FLAG="--noupdate"
          if [ "${{ steps.depcheck-cache.outputs.cache-hit }}" != "true" ]; then
            echo "No hay cache previo de la base NVD: se hará un update real esta vez."
            UPDATE_FLAG=""
          fi
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -v "$HOME/.dependency-check-data:/usr/share/dependency-check/data" \
            owasp/dependency-check:latest \
            --project "UCE-Nexus" \
            --scan /src \
            --format ALL \
            --out /src/reports/dependency-check \
            $UPDATE_FLAG \
            --enableExperimental \
            ${{ steps.nvd.outputs.flag }} \
            --exclude "**/node_modules/**" \
            --exclude "**/target/**" \
            --exclude "**/venv/**" \
            --exclude "**/dist/**" \
            --exclude "**/chroma_db/**" \
            --exclude "**/.git/**"
        continue-on-error: true

      - name: Verificar que Dependency-Check produjo reportes
        run: |
          if [ ! -f "reports/dependency-check/dependency-check-report.sarif" ]; then
            echo "::error::Dependency-Check no generó dependency-check-report.sarif — revisa el log del step anterior."
            ls -la reports/dependency-check/ 2>/dev/null || echo "(la carpeta reports/dependency-check ni siquiera existe)"
          else
            echo "OK: $(wc -l < reports/dependency-check/dependency-check-report.sarif) líneas en el SARIF"
          fi
        continue-on-error: true

      - name: Instalar cargo-audit
        run: cargo install cargo-audit
        continue-on-error: true

      - name: cargo audit (SCA Rust, ms-09-geocampus)
        working-directory: services/ms-09-geocampus
        run: cargo audit --json > cargo-audit-report.json || true
        continue-on-error: true

      - name: cargo audit (SCA Rust, ms-11-catalog)
        working-directory: services/ms-11-catalog
        run: cargo audit --json > cargo-audit-report.json || true
        continue-on-error: true

      - name: Publicar reportes SCA como artefacto (para el informe técnico)
        uses: actions/upload-artifact@v4
        with:
          name: sca-reports
          path: |
            reports/dependency-check/**
            services/ms-09-geocampus/cargo-audit-report.json
            services/ms-11-catalog/cargo-audit-report.json
          retention-days: 30
          if-no-files-found: warn

      # ==========================================
      # 5. SonarQube Scan
      # ==========================================
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=g9-UCE-Nexus
            -Dsonar.projectName=g9-UCE-Nexus
            -Dsonar.sources=apps,services,packages
            -Dsonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/build/**,**/target/**,**/venv/**,**/__pycache__/**,**/chroma_db/**,**/*.sarif,**/coverage.xml,**/coverage.out,**/cargo-audit-report.json
            -Dsonar.tests=apps,services,packages
            -Dsonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.test.js,**/test_*.py,**/*_test.go,**/tests/**
            -Dsonar.python.version=3.10
            -Dsonar.javascript.lcov.reportPaths=**/coverage/lcov.info
            -Dsonar.typescript.lcov.reportPaths=**/coverage/lcov.info
            -Dsonar.python.coverage.reportPaths=services/ms-07-notifications/coverage.xml,services/ms-08-ai-agent/coverage.xml
            -Dsonar.go.coverage.reportPaths=services/ms-06-booking/coverage.out
            -Dsonar.sarifReportPaths=reports/dependency-check/dependency-check-report.sarif,services/ms-09-geocampus/clippy.sarif,services/ms-11-catalog/clippy.sarif

      - name: SonarQube Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
