version: '3.8'

services:
  # ==========================================
  # 0. MICRO-FRONTENDS (Servidos por Nginx)
  # ==========================================
  web-host:
    image: ${DOCKER_HUB_USER:-abel3010}/web-host:${IMAGE_TAG:-latest}
    container_name: nexus-web-host
    restart: unless-stopped
    ports:
      - "5000:80"
    networks:
      - nexus-network

  web-academic:
    image: ${DOCKER_HUB_USER:-abel3010}/web-academic:${IMAGE_TAG:-latest}
    container_name: nexus-web-academic
    restart: unless-stopped
    ports:
      - "5001:80"
    networks:
      - nexus-network

  web-campus:
    image: ${DOCKER_HUB_USER:-abel3010}/web-campus:${IMAGE_TAG:-latest}
    container_name: nexus-web-campus
    restart: unless-stopped
    ports:
      - "5002:80"
    networks:
      - nexus-network

  web-chatbot:
    image: ${DOCKER_HUB_USER:-abel3010}/web-chatbot:${IMAGE_TAG:-latest}
    container_name: nexus-web-chatbot
    restart: unless-stopped
    ports:
      - "5003:80"
    networks:
      - nexus-network

  # ==========================================
  # 1. MICROSERVICIOS DE LA APLICACIÓN
  # ==========================================
  
  # MS-01: API Gateway (Node.js/TypeScript)
  ms-01-gateway:
    image: ${DOCKER_HUB_USER:-abel3010}/ms-01-gateway:${IMAGE_TAG:-latest}
    container_name: nexus-ms-01-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - BOOKING_SERVICE_URL=ms-06-booking:50051
      - KEYCLOAK_JWKS_URI=http://${DB_PRIVATE_IP:-localhost}:8080/realms/UCE-Nexus/protocol/openid-connect/certs
      - ENROLLMENT_SERVICE_URL=http://ms-03-enrollment:3001
      - AI_AGENT_URL=http://ms-08-ai-agent:8001
      - GEOCAMPUS_SERVICE_URL=http://ms-09-geocampus:8009
    depends_on:
      - ms-06-booking
      - ms-03-enrollment
    networks:
      - nexus-network

  # MS-06: Booking Engine (Go gRPC)
  ms-06-booking:
    image: ${DOCKER_HUB_USER:-abel3010}/ms-06-booking:${IMAGE_TAG:-latest}
    container_name: nexus-ms-06-booking
    restart: unless-stopped
    ports:
      - "50051:50051"
    environment:
      - PORT=50051
      - ENV=production
      - DB_HOST=${DB_PRIVATE_IP:-localhost}
      - DB_PORT=5432
      - DB_USER=uce
      - DB_PASSWORD=password
      - DB_NAME=uce_nexus_prod
      - REDIS_ADDR=${DB_PRIVATE_IP:-localhost}:6379
      - MONGO_URI=mongodb://admin:password@${DB_PRIVATE_IP:-localhost}:27017/
      - KAFKA_BROKERS=${DB_PRIVATE_IP:-localhost}:9092
      - RABBITMQ_URI=amqp://guest:guest@${DB_PRIVATE_IP:-localhost}:5672/
    networks:
      - nexus-network

  # MS-11: Catalog Service (Rust gRPC)
  ms-11-catalog:
    image: ${DOCKER_HUB_USER:-abel3010}/ms-11-catalog:${IMAGE_TAG:-latest}
    container_name: nexus-ms-11-catalog
    restart: unless-stopped
    ports:
      - "50052:50052"
    environment:
      - PORT=50052
      - DATABASE_URL=postgres://catalog_user:catalog_password@${DB_PRIVATE_IP:-localhost}:5433/uce_catalog_dev
    networks:
      - nexus-network

  # MS-03: Enrollment and Academic Service (Node.js/Express)
  ms-03-enrollment:
    image: ${DOCKER_HUB_USER:-abel3010}/ms-03-enrollment:${IMAGE_TAG:-latest}
    container_name: nexus-ms-03-enrollment
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - DATABASE_URL=postgres://enrollment_user:enrollment_password@${DB_PRIVATE_IP:-localhost}:5434/uce_enrollment_prod
      - CATALOG_DATABASE_URL=postgres://catalog_user:catalog_password@${DB_PRIVATE_IP:-localhost}:5433/uce_catalog_dev
    networks:
      - nexus-network

  # MS-08: AI Agent / Orchestrator (Python FastAPI)
  ms-08-ai-agent:
    image: ${DOCKER_HUB_USER:-abel3010}/ms-08-ai-agent:${IMAGE_TAG:-latest}
    container_name: nexus-ms-08-ai-agent
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - ENV=production
      - REDIS_URL=redis://${DB_PRIVATE_IP:-localhost}:6379
      - GATEWAY_URL=http://ms-01-gateway:3000
      - CATALOG_GRPC_URL=ms-11-catalog:50052
      - KEYCLOAK_JWKS_URI=http://${DB_PRIVATE_IP:-localhost}:8080/realms/UCE-Nexus/protocol/openid-connect/certs
      - DATABASE_URL=postgresql://uce:password@${DB_PRIVATE_IP:-localhost}:5432/uce_nexus_prod
      # Credenciales inyectadas desde el entorno de producción
      - GROQ_API_KEY
      - GEMINI_API_KEY
      - OPENROUTER_API_KEY
      - B2_ENDPOINT_URL
      - B2_KEY_ID
      - B2_APPLICATION_KEY
      - B2_BUCKET_NAME
    networks:
      - nexus-network

  # MS-09: GeoCampus Service (Rust Backend)
  ms-09-geocampus:
    image: ${DOCKER_HUB_USER:-abel3010}/ms-09-geocampus:${IMAGE_TAG:-latest}
    container_name: nexus-ms-09-geocampus
    restart: unless-stopped
    ports:
      - "8009:8009"
    environment:
      - DATABASE_URL=postgres://geocampus_user:geocampus_password@${DB_PRIVATE_IP:-localhost}:5435/uce_geocampus_dev
      - MQTT_HOST=${DB_PRIVATE_IP:-localhost}
      - MQTT_PORT=1883
    networks:
      - nexus-network

  # MS-07: Notifications Service (Python FastAPI / RabbitMQ Consumer)
  ms-07-notifications:
    image: ${DOCKER_HUB_USER:-abel3010}/ms-07-notifications:${IMAGE_TAG:-latest}
    container_name: nexus-ms-07-notifications
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - RABBITMQ_URI=amqp://guest:guest@${DB_PRIVATE_IP:-localhost}:5672/
      - PYTHONUNBUFFERED=1
    networks:
      - nexus-network

networks:
  nexus-network:
    driver: bridge
