version: '3.8'

services:
  # ==========================================
  # 1. SEGURIDAD E IDENTIDAD (Req 5)
  # ==========================================
  postgres-iam:
    image: postgres:15-alpine
    container_name: nexus-db-iam
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
      POSTGRES_DB: keycloak
    ports:
      - "5431:5432"
    networks:
      - nexus-network
    deploy:
      resources:
        limits:
          memory: 256M

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: nexus-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-iam:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      - postgres-iam
    networks:
      - nexus-network

  # ==========================================
  # 2. BASES DE DATOS DE NEGOCIO (Req 11)
  # ==========================================
  postgres-app:
    image: postgres:15-alpine
    container_name: nexus-db-app
    environment:
      POSTGRES_USER: uce
      POSTGRES_PASSWORD: password
      POSTGRES_DB: uce_nexus_dev
    ports:
      - "5432:5432"
    networks:
      - nexus-network

  mongodb:
    image: mongo:7.0
    container_name: nexus-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    networks:
      - nexus-network

  redis-cache:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "6379:6379"
    networks:
      - nexus-network

  # ==========================================
  # 3. BROKERS DE MENSAJERÍA (Req 15)
  # ==========================================
  # Zookeeper (Requisito para Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: nexus-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - nexus-network

  # Kafka (Event Streaming)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: nexus-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - nexus-network

  # RabbitMQ (Task Queue / Retry patterns)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nexus-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672" # Puerto TCP
      - "15672:15672" # Interfaz de gestión web
    networks:
      - nexus-network

  # Mosquitto (MQTT para Telemetría Geoespacial)
  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: nexus-mqtt
    ports:
      - "1883:1883"
      - "9001:9001" # WebSockets
    command: "mosquitto -c /mosquitto-no-auth.conf"
    networks:
      - nexus-network

networks:
  nexus-network:
    driver: bridge
