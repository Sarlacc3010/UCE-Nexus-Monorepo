version: '3.8'

services:
  # ==========================================
  # 1. MICROSERVICIOS DE LA APLICACIÓN (Build Local)
  # ==========================================
  
  # MS-01: API Gateway (Node.js/TypeScript)
  ms-01-gateway:
    build:
      context: ../../services/ms-01-gateway
      dockerfile: dockerfile
    container_name: nexus-ms-01-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - BOOKING_SERVICE_URL=ms-06-booking:50051
      - IDENTITY_SERVICE_URL=http://ms-02-identity:4002
      - ENROLLMENT_SERVICE_URL=http://ms-03-enrollment:3001
      - AI_AGENT_URL=http://ms-08-ai-agent:8001
      - GEOCAMPUS_SERVICE_URL=http://ms-09-geocampus:8009
      - PAYMENT_WRITE_URL=http://ms-04-payment-write:4004
      - PAYMENT_READ_URL=http://ms-05-payment-read:4005
    depends_on:
      - ms-02-identity
      - ms-06-booking
      - ms-03-enrollment
      - ms-04-payment-write
      - ms-05-payment-read
    networks:
      - nexus-network

  # MS-06: Booking Engine (Go gRPC)
  ms-06-booking:
    build:
      context: ../../services/ms-06-booking
      dockerfile: dockerfile
    container_name: nexus-ms-06-booking
    restart: unless-stopped
    ports:
      - "50051:50051"
    environment:
      - PORT=50051
      - ENV=development
      - REDIS_ADDR=redis-cache:6379
      - DB_HOST=postgres-app
      - DB_PORT=5432
      - DB_USER=uce
      - DB_PASSWORD=password
      - DB_NAME=uce_nexus_dev
      - MONGO_URI=mongodb://admin:password@mongodb:27017/
      - KAFKA_BROKERS=kafka:29092
      - RABBITMQ_URI=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - postgres-app
      - mongodb
      - redis-cache
      - kafka
      - rabbitmq
    networks:
      - nexus-network

  # MS-11: Catalog Service (Rust gRPC)
  ms-11-catalog:
    build:
      context: ../../services/ms-11-catalog
      dockerfile: dockerfile
    container_name: nexus-ms-11-catalog
    restart: unless-stopped
    ports:
      - "50052:50052"
    environment:
      - PORT=50052
      - DATABASE_URL=postgres://catalog_user:catalog_password@postgres-catalog:5432/uce_catalog_dev
    depends_on:
      - postgres-catalog
    networks:
      - nexus-network

  # MS-03: Enrollment and Academic Service (Node.js/Express)
  ms-03-enrollment:
    build:
      context: ../../services/ms-03-enrollment
      dockerfile: dockerfile
    image: docker-ms-03-enrollment:latest
    container_name: nexus-ms-03-enrollment
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=development
      - DATABASE_URL=postgres://enrollment_user:enrollment_password@postgres-enrollment:5432/uce_enrollment_dev
      - KAFKA_BROKERS=kafka:29092
    depends_on:
      - postgres-enrollment
      - kafka
    networks:
      - nexus-network

  # MS-07: Notifications Service (Python FastAPI / RabbitMQ Consumer)
  ms-07-notifications:
    build:
      context: ../../services/ms-07-notifications
      dockerfile: dockerfile
    container_name: nexus-ms-07-notifications
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - RABBITMQ_URI=amqp://guest:guest@rabbitmq:5672/
      - PYTHONUNBUFFERED=1
    env_file:
      - ../../services/ms-07-notifications/.env
    depends_on:
      - rabbitmq
    networks:
      - nexus-network

  # MS-08: AI Agent / Orchestrator (Python FastAPI)
  ms-08-ai-agent:
    build:
      context: ../../services/ms-08-ai-agent
      dockerfile: dockerfile
    image: docker-ms-08-ai-agent:latest
    container_name: nexus-ms-08-ai-agent
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - ENV=development
      - REDIS_URL=redis://redis-cache:6379
      - GATEWAY_URL=http://ms-01-gateway:3000
      - CATALOG_GRPC_URL=ms-11-catalog:50052
      - IDENTITY_SERVICE_URL=http://ms-02-identity:4002
      - DATABASE_URL=postgresql://uce:password@postgres-app:5432/uce_nexus_dev
    env_file:
      - ../../services/ms-08-ai-agent/.env
    depends_on:
      - redis-cache
      - postgres-app
      - ms-02-identity
    networks:
      - nexus-network

  # MS-09: GeoCampus Service (Rust)
  ms-09-geocampus:
    build:
      context: ../../services/ms-09-geocampus
      dockerfile: Dockerfile
    container_name: nexus-ms-09-geocampus
    restart: unless-stopped
    ports:
      - "8009:8009"
    environment:
      - PORT=8009
      - DATABASE_URL=postgres://geocampus_user:geocampus_password@postgres-geocampus:5432/uce_geocampus_dev
      - MQTT_HOST=mqtt-broker
      - MQTT_PORT=1883
    depends_on:
      - postgres-geocampus
      - mqtt-broker
    networks:
      - nexus-network

  # ==========================================
  # 2. SEGURIDAD E IDENTIDAD (Keycloak)
  # ==========================================
  postgres-iam:
    image: postgres:15-alpine
    container_name: nexus-db-iam
    restart: unless-stopped
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
      POSTGRES_DB: keycloak
    volumes:
      - pg-iam-data:/var/lib/postgresql/data
    ports:
      - "5431:5432"
    networks:
      - nexus-network
    deploy:
      resources:
        limits:
          memory: 256M

  ms-02-identity:
    build:
      context: ../../services/ms-02-identity
      dockerfile: Dockerfile
    image: docker-ms-02-identity:latest
    container_name: nexus-ms-02-identity
    restart: unless-stopped
    ports:
      - "4002:4002"
    environment:
      - PORT=4002
      - NODE_ENV=development
      - DATABASE_URL=postgres://keycloak:password@postgres-iam:5432/keycloak
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres-iam
    networks:
      - nexus-network

  # ==========================================
  # 3. BASES DE DATOS DE NEGOCIO (Desarrollo)
  # ==========================================
  postgres-app:
    image: postgres:15-alpine
    container_name: nexus-db-app
    restart: unless-stopped
    environment:
      POSTGRES_USER: uce
      POSTGRES_PASSWORD: password
      POSTGRES_DB: uce_nexus_dev
    volumes:
      - pg-app-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - nexus-network

  postgres-catalog:
    image: postgres:15-alpine
    container_name: nexus-db-catalog
    restart: unless-stopped
    environment:
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_password
      POSTGRES_DB: uce_catalog_dev
    volumes:
      - pg-catalog-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - nexus-network

  postgres-enrollment:
    image: postgres:15-alpine
    container_name: nexus-db-enrollment
    restart: unless-stopped
    environment:
      POSTGRES_USER: enrollment_user
      POSTGRES_PASSWORD: enrollment_password
      POSTGRES_DB: uce_enrollment_dev
    volumes:
      - pg-enrollment-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - nexus-network

  postgres-geocampus:
    image: postgres:15-alpine
    container_name: nexus-db-geocampus
    restart: unless-stopped
    environment:
      POSTGRES_USER: geocampus_user
      POSTGRES_PASSWORD: geocampus_password
      POSTGRES_DB: uce_geocampus_dev
    volumes:
      - pg-geocampus-data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - nexus-network

  mongodb:
    image: mongo:7.0
    container_name: nexus-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - nexus-network

  redis-cache:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - nexus-network

  # ==========================================
  # 4. BROKERS DE MENSAJERÍA y MQTT
  # ==========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: nexus-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - nexus-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: nexus-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - nexus-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nexus-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - nexus-network

  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: nexus-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    command: "mosquitto -c /mosquitto-no-auth.conf"
    networks:
      - nexus-network
  # MS-04: Payment Event Engine (Write Service)
  ms-04-payment-write:
    build:
      context: ../../services/ms-04-payment-write
      dockerfile: dockerfile
    image: docker-ms-04-payment-write:latest
    container_name: nexus-ms-04-payment-write
    restart: unless-stopped
    ports:
      - "4004:4004"
    environment:
      - PORT=4004
      - NODE_ENV=development
      - DATABASE_URL=postgres://uce:password@postgres-app:5432/uce_nexus_dev
      - KAFKA_BROKERS=kafka:29092
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    depends_on:
      - postgres-app
      - kafka
    networks:
      - nexus-network

  # MS-05: Payment Cache Query Engine (Read Service)
  ms-05-payment-read:
    build:
      context: ../../services/ms-05-payment-read
      dockerfile: dockerfile
    image: docker-ms-05-payment-read:latest
    container_name: nexus-ms-05-payment-read
    restart: unless-stopped
    ports:
      - "4005:4005"
    environment:
      - PORT=4005
      - NODE_ENV=development
      - DATABASE_URL=postgres://uce:password@postgres-app:5432/uce_nexus_dev
      - KAFKA_BROKERS=kafka:29092
      - REDIS_URL=redis://redis-cache:6379
    depends_on:
      - postgres-app
      - kafka
      - redis-cache
    networks:
      - nexus-network

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: nexus-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ucenexus.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres-iam
      - postgres-app
      - postgres-catalog
      - postgres-enrollment
    networks:
      - nexus-network

volumes:
  pg-iam-data:
    driver: local
  pg-app-data:
    driver: local
  pg-catalog-data:
    driver: local
  pg-enrollment-data:
    driver: local
  pg-geocampus-data:
    driver: local
  mongo-data:
    driver: local
  redis-data:
    driver: local
  pgadmin-data:
    driver: local

networks:
  nexus-network:
    driver: bridge
