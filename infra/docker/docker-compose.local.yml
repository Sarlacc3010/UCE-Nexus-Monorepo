version: '3.8'

services:
  # ==========================================
  # 1. MICROSERVICIOS DE LA APLICACIÓN (Build Local)
  # ==========================================
  
  # MS-01: API Gateway (Node.js/TypeScript)
  ms-01-gateway:
    build:
      context: ../../services/ms-01-gateway
      dockerfile: dockerfile
    container_name: nexus-ms-01-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - BOOKING_SERVICE_URL=ms-06-booking:50051
      - KEYCLOAK_JWKS_URI=http://keycloak:8080/realms/UCE-Nexus/protocol/openid-connect/certs
    depends_on:
      - keycloak
      - ms-06-booking
    networks:
      - nexus-network

  # MS-06: Booking Engine (Go gRPC)
  ms-06-booking:
    build:
      context: ../../services/ms-06-booking
      dockerfile: dockerfile
    container_name: nexus-ms-06-booking
    restart: unless-stopped
    ports:
      - "50051:50051"
    environment:
      - PORT=50051
      - ENV=development
      - REDIS_ADDR=redis-cache:6379
      - DB_HOST=postgres-app
      - DB_PORT=5432
      - DB_USER=uce
      - DB_PASSWORD=password
      - DB_NAME=uce_nexus_dev
      - MONGO_URI=mongodb://admin:password@mongodb:27017/
      - KAFKA_BROKERS=kafka:29092
      - RABBITMQ_URI=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - postgres-app
      - mongodb
      - redis-cache
      - kafka
      - rabbitmq
    networks:
      - nexus-network

  # MS-11: Catalog Service (Rust gRPC)
  ms-11-catalog:
    build:
      context: ../../services/ms-11-catalog
      dockerfile: dockerfile
    container_name: nexus-ms-11-catalog
    restart: unless-stopped
    ports:
      - "50052:50052"
    environment:
      - PORT=50052
      - DATABASE_URL=postgres://catalog_user:catalog_password@postgres-catalog:5432/uce_catalog_dev
    depends_on:
      - postgres-catalog
    networks:
      - nexus-network

  # MS-07: Notifications Service (Python FastAPI / RabbitMQ Consumer)
  ms-07-notifications:
    build:
      context: ../../services/ms-07-notifications
      dockerfile: dockerfile
    container_name: nexus-ms-07-notifications
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - RABBITMQ_URI=amqp://guest:guest@rabbitmq:5672/
      - PYTHONUNBUFFERED=1
    depends_on:
      - rabbitmq
    networks:
      - nexus-network

  # ==========================================
  # 2. SEGURIDAD E IDENTIDAD (Keycloak)
  # ==========================================
  postgres-iam:
    image: postgres:15-alpine
    container_name: nexus-db-iam
    restart: unless-stopped
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
      POSTGRES_DB: keycloak
    volumes:
      - pg-iam-data:/var/lib/postgresql/data
    ports:
      - "5431:5432"
    networks:
      - nexus-network
    deploy:
      resources:
        limits:
          memory: 256M

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: nexus-keycloak
    command: start-dev
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-iam:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      - postgres-iam
    networks:
      - nexus-network

  # ==========================================
  # 3. BASES DE DATOS DE NEGOCIO (Desarrollo)
  # ==========================================
  postgres-app:
    image: postgres:15-alpine
    container_name: nexus-db-app
    restart: unless-stopped
    environment:
      POSTGRES_USER: uce
      POSTGRES_PASSWORD: password
      POSTGRES_DB: uce_nexus_dev
    volumes:
      - pg-app-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - nexus-network

  postgres-catalog:
    image: postgres:15-alpine
    container_name: nexus-db-catalog
    restart: unless-stopped
    environment:
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_password
      POSTGRES_DB: uce_catalog_dev
    volumes:
      - pg-catalog-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - nexus-network

  mongodb:
    image: mongo:7.0
    container_name: nexus-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - nexus-network

  redis-cache:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - nexus-network

  # ==========================================
  # 4. BROKERS DE MENSAJERÍA y MQTT
  # ==========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: nexus-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - nexus-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: nexus-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - nexus-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nexus-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - nexus-network

  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: nexus-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    command: "mosquitto -c /mosquitto-no-auth.conf"
    networks:
      - nexus-network

volumes:
  pg-iam-data:
    driver: local
  pg-app-data:
    driver: local
  pg-catalog-data:
    driver: local
  mongo-data:
    driver: local
  redis-data:
    driver: local

networks:
  nexus-network:
    driver: bridge
