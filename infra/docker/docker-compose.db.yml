version: '3.8'

services:
  # ==========================================
  # 1. SEGURIDAD E IDENTIDAD (Keycloak)
  # ==========================================
  postgres-iam:
    image: postgres:15-alpine
    container_name: nexus-db-iam
    restart: unless-stopped
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
      POSTGRES_DB: keycloak
    volumes:
      - pg-iam-data:/var/lib/postgresql/data
    ports:
      - "5431:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nexus-db-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: nexus-keycloak
    command: start-dev
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-iam:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      postgres-iam:
        condition: service_healthy
    networks:
      - nexus-db-network

  # ==========================================
  # 2. BASES DE DATOS DE NEGOCIO
  # ==========================================
  postgres-app:
    image: postgres:15-alpine
    container_name: nexus-db-app
    restart: unless-stopped
    environment:
      POSTGRES_USER: uce
      POSTGRES_PASSWORD: password
      POSTGRES_DB: uce_nexus_prod
    volumes:
      - pg-app-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - nexus-db-network

  postgres-catalog:
    image: postgres:15-alpine
    container_name: nexus-db-catalog
    restart: unless-stopped
    environment:
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_password
      POSTGRES_DB: uce_catalog_dev
    volumes:
      - pg-catalog-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - nexus-db-network

  postgres-enrollment:
    image: postgres:15-alpine
    container_name: nexus-db-enrollment
    restart: unless-stopped
    environment:
      POSTGRES_USER: enrollment_user
      POSTGRES_PASSWORD: enrollment_password
      POSTGRES_DB: uce_enrollment_prod
    volumes:
      - pg-enrollment-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - nexus-db-network

  postgres-geocampus:
    image: postgres:15-alpine
    container_name: nexus-db-geocampus
    restart: unless-stopped
    environment:
      POSTGRES_USER: geocampus_user
      POSTGRES_PASSWORD: geocampus_password
      POSTGRES_DB: uce_geocampus_dev
    volumes:
      - pg-geocampus-data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - nexus-db-network

  mongodb:
    image: mongo:7.0
    container_name: nexus-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - nexus-db-network

  redis-cache:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - nexus-db-network

  # ==========================================
  # 3. BROKERS DE MENSAJERÍA y MQTT
  # ==========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: nexus-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - nexus-db-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: nexus-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - nexus-db-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nexus-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - nexus-db-network

  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: nexus-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    command: "mosquitto -c /mosquitto-no-auth.conf"
    networks:
      - nexus-db-network

# ==========================================
# VOLÚMENES PERSISTENTES
# ==========================================
volumes:
  pg-iam-data:
    driver: local
  pg-app-data:
    driver: local
  pg-catalog-data:
    driver: local
  pg-enrollment-data:
    driver: local
  pg-geocampus-data:
    driver: local
  mongo-data:
    driver: local
  redis-data:
    driver: local

networks:
  nexus-db-network:
    driver: bridge
